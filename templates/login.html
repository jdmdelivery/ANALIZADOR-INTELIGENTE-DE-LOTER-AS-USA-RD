<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Analizador de Loterías</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="premium-body login-body">
    <canvas id="particlesCanvas" aria-hidden="true"></canvas>

    <div class="login-wrapper">
        <div class="login-card glass-panel animate-slide-up">
            <div class="login-logo">
                <span class="login-logo-ball">🎱</span>
                <h1>Analizador Inteligente</h1>
                <p>Loterías USA + RD</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="login-alerts">
                {% for category, message in messages %}
                <div class="login-alert login-alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('login') }}" class="login-form">
                <input type="hidden" name="next" value="{{ next_url or '' }}">
                <div class="login-field">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                           placeholder="Tu usuario" autofocus>
                </div>
                <div class="login-field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                           placeholder="••••••••">
                </div>
                <button type="submit" class="btn-login-glow">🔐 Entrar</button>
            </form>

            <p class="login-disclaimer">{{ disclaimer }}</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
